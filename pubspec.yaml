name: oye
description: OYE — Personal Music Streaming
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # YouTube stream extraction & search (pure Dart, Android + iOS)
  youtube_explode_dart: ^3.0.5

  # Audio playback with queue, shuffle, repeat
  just_audio: ^0.9.40

  # Background audio playback + lock screen controls
  just_audio_background: ^0.0.1-beta.12

  # Image caching
  cached_network_image: ^3.4.1

  # State management
  provider: ^6.1.2

  # Persistent key-value storage
  shared_preferences: ^2.3.3

  # Reactive streams
  rxdart: ^0.27.7

  # Google Fonts (Epilogue + Manrope — matching Sonic Editorial design)
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
